<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>A Blue Ring Cut</title>
<style>
* { box-sizing: border-box; }
html, body { min-height: 100%; margin: 0; background: #f4efe4; color: #2c2a27; }
body {
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", system-ui, sans-serif;
  padding: 20px 14px 34px;
  background: #f4efe4;
}
.wrap {
  display: grid;
  gap: 8px;
  max-width: 860px;
  margin: 0 auto;
}
.meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 10px;
}
.name { color: #4b463f; font-size: 15px; letter-spacing: 0.08em; }
.tag { color: #7a7165; font-size: 11px; letter-spacing: 0.06em; }
.screen {
  --screen0: #fbf7ed;
  --screen1: #e6d9c8;
  --ui0: #fff8eb;
  --ui1: #e8d8c4;
  --board0: #f2e5d2;
  --board1: #d1bea8;
  --grid-line: rgba(95, 75, 56, .15);
  --wall0: #fff5e8;
  --wall1: #d9c6ae;
  --wall-line: rgba(63, 80, 94, .3);
  --piece0: #f7fbff;
  --piece1: #8fc1d9;
  --piece2: #3f7fad;
  --piece-line: rgba(35, 75, 104, .34);
  --accent: #d75c51;
  --accent2: #3f7fad;
  --goal: #3f7fad;
  --goal-fill: transparent;
  --goal-border: #4f8fbb;
  --goal-inner: rgba(255,255,255,.5);
  --goal-opacity: .88;
  position: relative;
  height: 620px;
  border-radius: 16px;
  overflow: hidden;
  background: radial-gradient(120% 100% at 50% 0%, var(--screen0) 0%, var(--screen1) 78%);
  border: 1px solid rgba(72, 64, 52, .14);
}
.topbar {
  display: grid;
  grid-template-columns: 40px minmax(0, 1fr) 40px;
  align-items: center;
  gap: 8px;
  padding: 14px 14px 8px;
}
.round,
.answer,
.hint,
.reset {
  display: grid;
  place-items: center;
  color: #46413a;
  background: linear-gradient(160deg, var(--ui0) 0%, var(--ui1) 100%);
  border: 1px solid rgba(64, 56, 48, .13);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.68), 0 2px 4px rgba(88, 66, 45, .08);
}
.round {
  width: 34px;
  height: 34px;
  border-radius: 12px;
}
.settings { justify-self: end; }
.status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  white-space: nowrap;
}
.no {
  color: var(--accent2);
  font-size: 14px;
  letter-spacing: .05em;
  font-weight: 800;
}
.count {
  color: #4b453d;
  font-size: 14px;
  letter-spacing: .04em;
  font-weight: 600;
}
.answer {
  width: 48px;
  height: 34px;
  border-radius: 12px;
  color: var(--accent);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .08em;
  border-color: color-mix(in srgb, var(--accent), transparent 68%);
}
.boards {
  display: grid;
  gap: clamp(18px, 3.5dvh, 34px);
  justify-items: center;
  padding-top: 8px;
}
.board {
  position: relative;
  width: min(260px, 70vw);
  aspect-ratio: 1;
  border-radius: 14px;
  overflow: hidden;
  background: linear-gradient(145deg, var(--board0) 0%, var(--board1) 100%);
  border: 2px solid rgba(78, 64, 49, .16);
  box-shadow: inset 0 1px 5px rgba(255,255,255,.75), inset 0 -10px 20px rgba(62,55,45,.06);
}
.grid {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
}
.cell { position: relative; border: .5px solid var(--grid-line); }
.wall {
  z-index: 1;
  margin: 4px;
  border-radius: 8px;
  background: linear-gradient(145deg, var(--wall0) 0%, var(--wall1) 100%);
  border: 2px solid var(--wall-line);
  box-shadow:
    inset 2px 2px 0 rgba(255,255,255,.34),
    inset -2px -3px 0 rgba(74, 58, 43, .12),
    0 3px 5px rgba(76, 54, 39, .13);
}
.goal {
  position: absolute;
  left: 60%;
  top: 20%;
  width: 20%;
  height: 20%;
  border-radius: 10px;
  background: var(--goal-fill);
  border: 3px solid var(--goal-border);
  box-shadow: inset 0 0 0 4px var(--goal-inner), 0 0 12px color-mix(in srgb, var(--goal), transparent 68%);
  opacity: var(--goal-opacity);
}
.board:nth-child(2) .goal { left: 20%; top: 60%; }
.piece {
  position: absolute;
  width: 20%;
  height: 20%;
}
.piece::before {
  content: "";
  position: absolute;
  inset: 10%;
  border-radius: 10px;
  background: linear-gradient(145deg, var(--piece0) 0%, var(--piece1) 52%, var(--piece2) 100%);
  border: 2px solid var(--piece-line);
  box-shadow:
    inset 2px 2px 0 rgba(255,255,255,.46),
    inset -3px -3px 0 rgba(74, 48, 35, .14),
    0 6px 10px rgba(92, 62, 45, .22);
}
.piece::after {
  content: "";
  position: absolute;
  left: 31%;
  top: 28%;
  width: 16%;
  height: 16%;
  border-radius: 50%;
  background: rgba(255,255,255,.55);
}
.p1 { left: 20%; top: 40%; }
.p2 { left: 60%; top: 40%; }
.active .piece::before {
  outline: 3px solid color-mix(in srgb, var(--accent), white 48%);
  outline-offset: 2px;
}
.trail {
  position: absolute;
  left: 20%;
  top: 40%;
  width: 20%;
  height: 20%;
}
.trail::before {
  content: "";
  position: absolute;
  inset: 10%;
  border-radius: 10px;
  border: 2px solid color-mix(in srgb, var(--accent), transparent 58%);
  box-shadow: 0 0 10px 2px color-mix(in srgb, var(--accent), transparent 78%);
  transform: scale(.76);
}
.move-mark {
  position: absolute;
  left: calc(20% + 22px);
  top: calc(40% - 8px);
  width: 18px;
  height: 18px;
  border-radius: 6px;
  background: color-mix(in srgb, var(--accent2), white 40%);
  box-shadow: 0 0 10px color-mix(in srgb, var(--accent2), transparent 68%);
}
.move-mark::before {
  content: "";
  position: absolute;
  left: 6px;
  top: 4px;
  width: 5px;
  height: 8px;
  border-right: 2px solid rgba(255,255,255,.85);
  border-bottom: 2px solid rgba(255,255,255,.85);
  transform: rotate(45deg);
}
.edge-glow {
  position: absolute;
  left: 40%;
  top: 40%;
  width: 20%;
  height: 4px;
  border-radius: 4px;
  background: color-mix(in srgb, var(--accent), white 30%);
  box-shadow: 0 0 13px 4px color-mix(in srgb, var(--accent), transparent 72%);
  opacity: .9;
}
.control-dock {
  position: absolute;
  left: 50%;
  bottom: 68px;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
.hint,
.reset {
  width: 50px;
  height: 50px;
  border-radius: 16px;
}
.hint {
  position: relative;
  color: var(--accent);
  border-color: color-mix(in srgb, var(--accent), transparent 70%);
}
.badge {
  position: absolute;
  top: -7px;
  right: -7px;
  min-width: 18px;
  height: 18px;
  padding: 0 4px;
  border-radius: 5px;
  font-size: 10px;
  font-weight: 800;
  line-height: 18px;
  text-align: center;
  background: color-mix(in srgb, var(--accent2), white 54%);
  color: #fff;
  box-shadow: inset 0 1px 1px rgba(255,255,255,.35), 0 1px 2px rgba(60,44,28,.18);
}
.ad-slot {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 44px;
  border-top: 1px solid rgba(64,56,48,.10);
  background: linear-gradient(180deg, transparent, rgba(255,255,255,.42));
}
svg {
  width: 22px;
  height: 22px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.9;
  stroke-linecap: round;
  stroke-linejoin: round;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="meta">
    <span class="name">A Blue Ring</span>
    <span class="tag">輪郭だけ青</span>
  </div>
  <div class="screen">
    <div class="topbar">
      <span class="round"><svg viewBox="0 0 24 24"><path d="M15 18 9 12l6-6"/></svg></span>
      <div class="status"><span class="no">#12</span><span class="count">1/4手詰</span><span class="answer">答え</span></div>
      <span class="round settings"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></svg></span>
    </div>
    <div class="boards">
      <div class="board active">
        <div class="grid"></div>
        <span class="goal"></span>
        <span class="trail"></span>
        <span class="piece p1"></span>
        <span class="move-mark"></span>
        <span class="edge-glow"></span>
      </div>
      <div class="board">
        <div class="grid"></div>
        <span class="goal"></span>
        <span class="piece p2"></span>
      </div>
    </div>
    <div class="control-dock">
      <span class="reset"><svg viewBox="0 0 24 24"><path d="M4 7v5h5"/><path d="M5.8 16.1A7 7 0 1 0 6 7.8"/></svg></span>
      <span class="hint"><svg viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M8.5 14.5a5 5 0 1 1 7 0c-.8.7-1.2 1.4-1.3 2H9.8c-.1-.6-.5-1.3-1.3-2Z"/></svg><span class="badge">5</span></span>
    </div>
    <div class="ad-slot"></div>
  </div>
</div>
<script>
for (const grid of document.querySelectorAll('.grid')) {
  for (let i = 0; i < 25; i += 1) {
    const cell = document.createElement('div');
    cell.className = 'cell' + ([6, 14, 17].includes(i) ? ' wall' : '');
    grid.appendChild(cell);
  }
}
</script>
</body>
</html>
