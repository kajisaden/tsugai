<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tsugai trail shadow mock</title>
<style>
:root {
  --bg: #f4efe6;
  --panel: #fbf7f0;
  --text: #3f352c;
  --dim: #7f7468;
  --line: rgba(84, 72, 61, 0.10);
  --floor-hi: #f8f2e8;
  --floor-lo: #e6dccd;
  --wall-hi: #ddd5c4;
  --wall-lo: #cfc6b2;
  --ball-a: #fafdff;
  --ball-b: #9ecde3;
  --ball-c: #669fbe;
  --ball-stroke: rgba(36, 107, 143, 0.50);
}
* { box-sizing: border-box; }
html, body { min-height: 100%; margin: 0; background: var(--bg); color: var(--text); }
body {
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", system-ui, sans-serif;
  padding: 28px 18px 40px;
}
main {
  max-width: 880px;
  margin: 0 auto;
}
h1 {
  margin: 0 0 8px;
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 24px;
  font-weight: 400;
  letter-spacing: 0.12em;
  color: #5a4a39;
}
.lead {
  margin: 0 0 24px;
  color: var(--dim);
  line-height: 1.7;
  font-size: 13px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 18px;
}
.card {
  background: var(--panel);
  border: 1px solid rgba(84, 72, 61, 0.10);
  border-radius: 12px;
  padding: 14px;
  box-shadow: 0 8px 24px rgba(88, 66, 45, 0.06);
}
.meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 10px;
}
.name {
  font-size: 15px;
  letter-spacing: 0.05em;
  color: #5a4a39;
}
.tag {
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 0.08em;
}
.stage {
  position: relative;
  height: 320px;
  border-radius: 12px;
  overflow: hidden;
  background: linear-gradient(180deg, #f8f3eb 0%, #efe7da 100%);
  border: 1px solid rgba(84, 72, 61, 0.08);
}
.board {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 260px;
  height: 260px;
  transform: translate(-50%, -50%);
  border-radius: 12px;
  overflow: hidden;
  background: radial-gradient(120% 120% at 50% 42%, var(--floor-hi) 0%, var(--floor-lo) 72%);
  border: 1px solid rgba(43, 38, 32, 0.20);
  box-shadow: inset 0 2px 7px rgba(70, 55, 30, 0.12), 0 1px 2px rgba(70, 55, 30, 0.06);
}
.cells {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
}
.cell {
  border: 0.5px solid var(--line);
}
.cell.wall::before {
  content: "";
  position: absolute;
  inset: 10%;
  border-radius: 12px;
  background: linear-gradient(160deg, var(--wall-hi) 0%, var(--wall-lo) 100%);
  box-shadow:
    inset 2px 2px 0 rgba(255, 255, 255, 0.34),
    inset -2px -3px 0 rgba(74, 58, 43, 0.12);
}
.cell.wall {
  position: relative;
}
.ball {
  position: absolute;
  left: 60%;
  top: 40%;
  width: 20%;
  height: 20%;
}
.ball::before {
  content: "";
  position: absolute;
  inset: 10%;
  border-radius: 12px;
  overflow: hidden;
  background: linear-gradient(145deg, var(--ball-a) 0%, var(--ball-b) 52%, var(--ball-c) 100%);
  box-shadow:
    inset 2px 2px 0 rgba(255, 255, 255, 0.46),
    inset -3px -3px 0 rgba(74, 48, 35, 0.14),
    0 3px 5px rgba(76, 54, 39, 0.13);
}
.ball::after {
  content: "";
  position: absolute;
  inset: 10%;
  border-radius: 12px;
  border: 2px solid var(--ball-stroke);
}
.shadow {
  position: absolute;
  left: 40%;
  top: 40%;
  width: 20%;
  height: 20%;
}
.shadow::before {
  content: "";
  position: absolute;
  animation: pulse 1.7s ease-in-out infinite;
}
.round-shadow::before {
  inset: 17%;
  border-radius: 999px;
  border: 2px solid rgba(18, 17, 14, 0.34);
  background: transparent;
  box-shadow:
    0 0 12px 3px rgba(168, 128, 31, 0.14),
    inset 0 0 8px 1px rgba(18, 17, 14, 0.06);
}
.block-shadow::before {
  inset: 10%;
  border-radius: 12px;
  border: 2px solid rgba(36, 107, 143, 0.26);
  background: transparent;
  box-shadow: none;
}
.note {
  margin: 10px 0 0;
  color: var(--dim);
  font-size: 12px;
  line-height: 1.6;
}
@keyframes pulse {
  0%, 100% { opacity: 0.38; transform: scale(0.82); }
  50% { opacity: 0.82; transform: scale(1); }
}
</style>
</head>
<body>
<main>
  <h1>Trail Shadow Mock</h1>
  <p class="lead">移動トレイルの影だけを切り出した比較モック。左が旧来の丸影、右がボールブロックに合わせた角丸タイル影です。</p>

  <section class="grid">
    <article class="card">
      <div class="meta">
        <div class="name">旧: 丸い影</div>
        <div class="tag">before</div>
      </div>
      <div class="stage">
        <div class="board">
          <div class="cells">
            <div class="cell"></div><div class="cell"></div><div class="cell wall"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell wall"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
          </div>
          <div class="shadow round-shadow"></div>
          <div class="ball"></div>
        </div>
      </div>
      <p class="note">リングとしては読めるが、青いボールブロックの形から外れて見える。</p>
    </article>

    <article class="card">
      <div class="meta">
        <div class="name">新: ボールブロック影</div>
        <div class="tag">after</div>
      </div>
      <div class="stage">
        <div class="board">
          <div class="cells">
            <div class="cell"></div><div class="cell"></div><div class="cell wall"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell wall"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
          </div>
          <div class="shadow block-shadow"></div>
          <div class="ball"></div>
        </div>
      </div>
      <p class="note">ボールブロックと同じ角丸だけ残し、面や影は持たせない版。輪郭だけで移動の余韻を示す。</p>
    </article>
  </section>
</main>
</body>
</html>
