<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tsugai minimal outline wall color mock</title>
<style>
* { box-sizing: border-box; }
html, body { min-height: 100%; margin: 0; background: #f5efe5; color: #2d2a28; }
body {
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", system-ui, sans-serif;
  padding: 20px 14px 34px;
  background: radial-gradient(120% 100% at 50% 0%, #fff8ef 0%, #eadccf 78%);
}
h1 {
  max-width: 860px;
  margin: 0 auto 8px;
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 21px;
  font-weight: 500;
  letter-spacing: .12em;
  color: #5f5146;
}
.lead {
  max-width: 860px;
  margin: 0 auto 18px;
  color: #74685f;
  font-size: 13px;
  line-height: 1.7;
}
.variants {
  display: grid;
  gap: 18px;
  max-width: 860px;
  margin: 0 auto;
}
.variant { display: grid; gap: 8px; }
.meta {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: baseline;
}
.name { color: #51483f; font-size: 15px; letter-spacing: .08em; }
.tag { color: #80746a; font-size: 11px; letter-spacing: .06em; }
.screen {
  --board0: #f2e1d1;
  --board1: #dcc5b3;
  --grid-line: rgba(96, 70, 52, .14);
  --wall0: #cdb39c;
  --wall1: #aa8c76;
  --wall2: #8c715f;
  --wall-line: rgba(82, 59, 45, .32);
  --wall-hi: rgba(255,255,255,.22);
  --wall-low: rgba(67, 45, 34, .12);
  --wall-cast: rgba(83, 54, 39, .13);
  --piece-radius: 7px;
  --piece-inset: 12%;
  --piece-bg: linear-gradient(145deg, #f4dfc9 0%, #cf9d78 58%, #9e694f 100%);
  --piece-shadow: inset -2px -2px 0 rgba(82, 48, 34, .22), inset 2px 2px 0 rgba(255,255,255,.34), 0 7px 11px rgba(104, 65, 45, .27);
  --piece-outline: 1px solid rgba(87, 52, 38, .24);
  --piece-after: none;
  --ghost-radius: 7px;
  --ghost-inset: 12%;
  --ghost-transform: scale(.78);
  position: relative;
  height: 620px;
  border-radius: 16px;
  overflow: hidden;
  background: radial-gradient(120% 100% at 50% 0%, #fff8ef 0%, #eadccf 78%);
  border: 1px solid rgba(84, 76, 63, .13);
}
.tone-warm {
  --board0: #f2e1d1;
  --board1: #dcc5b3;
  --grid-line: rgba(96, 70, 52, .14);
  --wall0: #cdb39c;
  --wall1: #aa8c76;
  --wall2: #8c715f;
  --wall-line: rgba(82, 59, 45, .34);
}
.tone-sage {
  --board0: #e4eadf;
  --board1: #cbd8c4;
  --grid-line: rgba(57, 82, 56, .14);
  --wall0: #bac7ad;
  --wall1: #91a07f;
  --wall2: #748267;
  --wall-line: rgba(49, 73, 48, .34);
  --wall-cast: rgba(54, 80, 52, .13);
}
.tone-bluegray {
  --board0: #e2e7e8;
  --board1: #c9d2d5;
  --grid-line: rgba(54, 69, 75, .14);
  --wall0: #b8c3c6;
  --wall1: #8d9da3;
  --wall2: #718088;
  --wall-line: rgba(48, 62, 69, .34);
  --wall-cast: rgba(48, 62, 69, .13);
}
.tone-lavender {
  --board0: #eae4ec;
  --board1: #d2cad8;
  --grid-line: rgba(70, 58, 85, .13);
  --wall0: #c5bbcc;
  --wall1: #9c8fa8;
  --wall2: #7d728a;
  --wall-line: rgba(61, 50, 75, .33);
  --wall-cast: rgba(61, 50, 75, .12);
}
.tone-clay {
  --board0: #f0ddcf;
  --board1: #d9bda9;
  --grid-line: rgba(96, 59, 44, .13);
  --wall0: #cfa88e;
  --wall1: #a97d65;
  --wall2: #865f4f;
  --wall-line: rgba(80, 47, 35, .33);
  --wall-cast: rgba(80, 47, 35, .14);
}
.tone-graphite {
  --board0: #e2ded5;
  --board1: #c9c3b8;
  --grid-line: rgba(60, 56, 49, .14);
  --wall0: #b8b1a4;
  --wall1: #8d867b;
  --wall2: #716b62;
  --wall-line: rgba(45, 41, 36, .34);
  --wall-cast: rgba(45, 41, 36, .14);
}
.tone-ivory {
  --board0: #f2eadb;
  --board1: #ded0ba;
  --grid-line: rgba(94, 74, 50, .13);
  --wall0: #d8c8ae;
  --wall1: #b79f7e;
  --wall2: #92795f;
  --wall-line: rgba(75, 57, 37, .32);
  --wall-cast: rgba(75, 57, 37, .12);
}
.topbar {
  display: grid;
  grid-template-columns: 40px minmax(0, 1fr) 40px;
  align-items: center;
  gap: 8px;
  padding: 14px 14px 8px;
}
.round,
.answer,
.hint,
.reset {
  display: grid;
  place-items: center;
  color: #4d4842;
  background: linear-gradient(160deg, #f5e7dc 0%, #e3d1c2 100%);
  border: 1px solid rgba(64, 56, 48, .12);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.58);
}
.round {
  width: 34px;
  height: 34px;
  border-radius: 50%;
}
.settings { justify-self: end; }
.status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  white-space: nowrap;
}
.no {
  color: #8f6c36;
  font-size: 14px;
  letter-spacing: .05em;
  font-weight: 700;
}
.count {
  color: #4d4842;
  font-size: 14px;
  letter-spacing: .04em;
}
.answer {
  width: 48px;
  height: 34px;
  border-radius: 12px;
  color: #8f6c36;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .08em;
  border-color: rgba(151, 110, 50, .26);
}
.boards {
  display: grid;
  gap: clamp(18px, 3.5dvh, 34px);
  justify-items: center;
  padding-top: 8px;
}
.board {
  position: relative;
  width: min(260px, 70vw);
  aspect-ratio: 1;
  border-radius: 12px;
  overflow: hidden;
  background: linear-gradient(145deg, var(--board0) 0%, var(--board1) 100%);
  border: 1px solid rgba(64, 56, 48, .18);
  box-shadow: inset 0 1px 4px rgba(255,255,255,.72), inset 0 -8px 18px rgba(62,55,45,.06);
}
.grid {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
}
.cell {
  position: relative;
  border: .5px solid var(--grid-line);
}
.wall {
  z-index: 1;
  background: linear-gradient(145deg, var(--wall0) 0%, var(--wall1) 58%, var(--wall2) 100%);
  border: 2px solid var(--wall-line);
  box-shadow:
    inset 1px 1px 0 var(--wall-hi),
    inset -2px -2px 0 var(--wall-low),
    0 3px 6px var(--wall-cast);
}
.wall::before {
  content: "";
  position: absolute;
  left: 7px;
  right: 9px;
  top: 6px;
  height: 2px;
  border-radius: 2px;
  background: rgba(255, 244, 227, .3);
}
.wall::after {
  content: "";
  position: absolute;
  right: 5px;
  bottom: 5px;
  width: 38%;
  height: 2px;
  border-radius: 2px;
  background: rgba(77, 51, 36, .13);
}
.tone-bluegray .wall::before,
.tone-lavender .wall::before,
.tone-graphite .wall::before {
  background: rgba(255,255,255,.22);
}
.goal {
  position: absolute;
  left: 60%;
  top: 20%;
  width: 20%;
  height: 20%;
  border-radius: 10px;
  border: 2px dashed rgba(143, 108, 54, .62);
  box-shadow: 0 0 12px rgba(218, 171, 82, .28);
}
.board:nth-child(2) .goal { left: 20%; top: 60%; }
.piece {
  position: absolute;
  width: 20%;
  height: 20%;
}
.piece::before {
  content: "";
  position: absolute;
  inset: var(--piece-inset);
  border-radius: var(--piece-radius);
  background: var(--piece-bg);
  border: var(--piece-outline);
  box-shadow: var(--piece-shadow);
}
.piece::after {
  content: "";
  position: absolute;
  inset: 25%;
  border-radius: 999px;
  background: var(--piece-after);
}
.p1 { left: 20%; top: 40%; }
.p2 { left: 60%; top: 40%; }
.active .piece::before {
  outline: 2px solid rgba(255, 223, 158, .56);
  outline-offset: 2px;
}
.edge-glow {
  position: absolute;
  left: 40%;
  top: 40%;
  width: 20%;
  height: 4px;
  border-radius: 4px;
  background: #ffd996;
  box-shadow: 0 0 13px 4px rgba(218, 171, 82, .36);
  opacity: .94;
}
.trail {
  position: absolute;
  left: 20%;
  top: 40%;
  width: 20%;
  height: 20%;
}
.trail::before {
  content: "";
  position: absolute;
  inset: var(--ghost-inset);
  border-radius: var(--ghost-radius);
  border: 2px solid rgba(73, 55, 38, .3);
  box-shadow: 0 0 12px 3px rgba(218, 171, 82, .21);
  transform: var(--ghost-transform);
}
.move-mark {
  position: absolute;
  left: calc(20% + 22px);
  top: calc(40% - 8px);
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: rgba(255, 231, 178, .86);
  box-shadow: 0 0 12px rgba(218, 171, 82, .34);
}
.move-mark::before {
  content: "";
  position: absolute;
  left: 6px;
  top: 4px;
  width: 5px;
  height: 8px;
  border-right: 2px solid rgba(86, 61, 33, .58);
  border-bottom: 2px solid rgba(86, 61, 33, .58);
  transform: rotate(45deg);
}
.control-dock {
  position: absolute;
  left: 50%;
  bottom: 68px;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
.hint,
.reset {
  width: 50px;
  height: 50px;
  border-radius: 16px;
}
.hint {
  position: relative;
  color: #8f6c36;
  border-color: rgba(151, 110, 50, .26);
}
.badge {
  position: absolute;
  top: -7px;
  right: -7px;
  min-width: 18px;
  height: 18px;
  padding: 0 4px;
  border-radius: 5px;
  font-size: 10px;
  font-weight: 700;
  line-height: 18px;
  text-align: center;
  background: #edd097;
  color: #342a1b;
  box-shadow: inset 0 1px 1px rgba(255,255,255,.7), 0 1px 2px rgba(80,58,18,.18);
}
.ad-slot {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 44px;
  border-top: 1px solid rgba(64,56,48,.10);
  background: linear-gradient(180deg, transparent, rgba(255,255,255,.42));
}
svg {
  width: 22px;
  height: 22px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}
@media (min-width: 760px) {
  .variants { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<h1>Minimal Outline Wall Colors</h1>
<p class="lead">駒は Stone Block、壁は情報量を抑えたアウトライン型に固定。盤と壁の色系統だけを変えて相性を比較するモック。</p>
<main class="variants">
  <section class="variant">
    <div class="meta"><span class="name">A Warm Stone</span><span class="tag">基準案</span></div>
    <div class="screen tone-warm"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">B Sage Stone</span><span class="tag">自然で穏やか</span></div>
    <div class="screen tone-sage"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">C Blue Gray</span><span class="tag">静かで読みやすい</span></div>
    <div class="screen tone-bluegray"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">D Lavender Gray</span><span class="tag">少し個性</span></div>
    <div class="screen tone-lavender"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">E Clay Stone</span><span class="tag">温かく濃い</span></div>
    <div class="screen tone-clay"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">F Graphite Stone</span><span class="tag">締まり重視</span></div>
    <div class="screen tone-graphite"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">G Ivory Stone</span><span class="tag">明るく上品</span></div>
    <div class="screen tone-ivory"></div>
  </section>
</main>
<template id="screen-template">
  <div class="topbar">
    <span class="round"><svg viewBox="0 0 24 24"><path d="M15 18 9 12l6-6"/></svg></span>
    <div class="status"><span class="no">#12</span><span class="count">1/4手詰</span><span class="answer">答え</span></div>
    <span class="round settings"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></svg></span>
  </div>
  <div class="boards">
    <div class="board active"><div class="grid"></div><span class="goal"></span><span class="trail"></span><span class="piece p1"></span><span class="move-mark"></span><span class="edge-glow"></span></div>
    <div class="board"><div class="grid"></div><span class="goal"></span><span class="piece p2"></span></div>
  </div>
  <div class="control-dock">
    <span class="reset"><svg viewBox="0 0 24 24"><path d="M4 7v5h5"/><path d="M5.8 16.1A7 7 0 1 0 6 7.8"/></svg></span>
    <span class="hint"><svg viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M8.5 14.5a5 5 0 1 1 7 0c-.8.7-1.2 1.4-1.3 2H9.8c-.1-.6-.5-1.3-1.3-2Z"/></svg><span class="badge">5</span></span>
  </div>
  <div class="ad-slot"></div>
</template>
<script>
const template = document.querySelector('#screen-template');
for (const screen of document.querySelectorAll('.screen')) {
  screen.append(template.content.cloneNode(true));
}
for (const grid of document.querySelectorAll('.grid')) {
  for (let i = 0; i < 25; i += 1) {
    const cell = document.createElement('div');
    cell.className = 'cell' + ([6, 14, 17].includes(i) ? ' wall' : '');
    grid.append(cell);
  }
}
</script>
</body>
</html>
