<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tsugai board color mock</title>
<style>
* { box-sizing: border-box; }
html, body { min-height: 100%; margin: 0; background: #f5efe5; color: #2d2a28; }
body {
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", system-ui, sans-serif;
  padding: 20px 14px 34px;
  background: radial-gradient(120% 100% at 50% 0%, #fff7ee 0%, #eadccf 78%);
}
h1 {
  max-width: 860px;
  margin: 0 auto 8px;
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 21px;
  font-weight: 500;
  letter-spacing: .12em;
  color: #5f5146;
}
.lead {
  max-width: 860px;
  margin: 0 auto 18px;
  color: #74685f;
  font-size: 13px;
  line-height: 1.7;
}
.variants {
  display: grid;
  gap: 18px;
  max-width: 860px;
  margin: 0 auto;
}
.variant { display: grid; gap: 8px; }
.meta {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: baseline;
}
.name { color: #51483f; font-size: 15px; letter-spacing: .08em; }
.tag { color: #80746a; font-size: 11px; letter-spacing: .06em; }
.screen {
  --board0: #e7f4ef;
  --board1: #cfe5df;
  --wall0: #b5cec8;
  --wall1: #8daaa4;
  --line: rgba(46, 84, 78, .16);
  --accent: #8a7443;
  --hint: rgba(218, 171, 82, .38);
  position: relative;
  height: 620px;
  border-radius: 16px;
  overflow: hidden;
  background: radial-gradient(120% 100% at 50% 0%, #fff7ee 0%, #eadccf 78%);
  border: 1px solid rgba(84, 76, 63, .13);
}
.sage {
  --board0: #e7f4ef;
  --board1: #cfe5df;
  --wall0: #b5cec8;
  --wall1: #8daaa4;
  --line: rgba(46, 84, 78, .16);
  --accent: #6e8e77;
}
.sky {
  --board0: #e4f0f6;
  --board1: #cadde7;
  --wall0: #adc6d4;
  --wall1: #82a0b3;
  --line: rgba(45, 76, 95, .16);
  --accent: #667f9b;
}
.lavender {
  --board0: #eee8f6;
  --board1: #d8cfe5;
  --wall0: #c2b6d4;
  --wall1: #9f93b8;
  --line: rgba(64, 52, 90, .16);
  --accent: #8570a5;
}
.bluegray {
  --board0: #e8edf0;
  --board1: #cfd9df;
  --wall0: #b3c1c8;
  --wall1: #8799a4;
  --line: rgba(47, 62, 72, .17);
  --accent: #687985;
}
.clay {
  --board0: #f0e3dc;
  --board1: #dcc8bd;
  --wall0: #c7a99c;
  --wall1: #a47f72;
  --line: rgba(96, 60, 48, .16);
  --accent: #9b6f58;
}
.graphite {
  --board0: #e7e5df;
  --board1: #cecbc2;
  --wall0: #aaa69c;
  --wall1: #817d74;
  --line: rgba(47, 43, 38, .18);
  --accent: #6d675d;
}
.topbar {
  display: grid;
  grid-template-columns: 40px minmax(0, 1fr) 40px;
  align-items: center;
  gap: 8px;
  padding: 14px 14px 8px;
}
.round,
.answer,
.hint,
.reset {
  display: grid;
  place-items: center;
  color: #4d4842;
  background: linear-gradient(160deg, #f5e7dc 0%, #e3d1c2 100%);
  border: 1px solid rgba(64, 56, 48, .12);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.58);
}
.round {
  width: 34px;
  height: 34px;
  border-radius: 50%;
}
.settings { justify-self: end; }
.status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  white-space: nowrap;
}
.no {
  color: var(--accent);
  font-size: 14px;
  letter-spacing: .05em;
  font-weight: 700;
}
.count {
  color: #4d4842;
  font-size: 14px;
  letter-spacing: .04em;
}
.answer {
  width: 48px;
  height: 34px;
  border-radius: 12px;
  color: #8f6c36;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .08em;
  border-color: rgba(151, 110, 50, .26);
}
.boards {
  display: grid;
  gap: clamp(18px, 3.5dvh, 34px);
  justify-items: center;
  padding-top: 8px;
}
.board {
  position: relative;
  width: min(260px, 70vw);
  aspect-ratio: 1;
  border-radius: 12px;
  overflow: hidden;
  background: linear-gradient(145deg, var(--board0) 0%, var(--board1) 100%);
  border: 1px solid rgba(64, 56, 48, .18);
  box-shadow: inset 0 1px 4px rgba(255,255,255,.72), inset 0 -8px 18px rgba(62,55,45,.06);
}
.grid {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
}
.cell { border: .5px solid var(--line); }
.wall {
  background: linear-gradient(160deg, var(--wall0), var(--wall1));
  border-color: color-mix(in srgb, var(--wall1), transparent 62%);
}
.goal {
  position: absolute;
  width: 20%;
  height: 20%;
  border-radius: 50%;
  border: 2px dashed rgba(143, 108, 54, .62);
  box-shadow: 0 0 12px rgba(218, 171, 82, .28);
}
.g1 { left: 60%; top: 20%; }
.g2 { left: 20%; top: 60%; }
.ball {
  position: absolute;
  width: 20%;
  height: 20%;
}
.ball::before {
  content: "";
  position: absolute;
  inset: 17%;
  border-radius: 50%;
  background: radial-gradient(circle at 34% 28%, #fff8f0 0%, #f4c8b0 44%, #c98467 100%);
  box-shadow:
    inset -2px -3px 7px rgba(126, 75, 52, .36),
    inset 3px 3px 6px rgba(255,255,255,.52),
    0 5px 9px rgba(126, 77, 52, .25);
}
.b1 { left: 20%; top: 40%; }
.b2 { left: 60%; top: 40%; }
.edge-glow {
  position: absolute;
  left: 40%;
  top: 40%;
  width: 20%;
  height: 4px;
  border-radius: 4px;
  background: #ffd996;
  box-shadow: 0 0 13px 4px rgba(218, 171, 82, .36);
  opacity: .94;
}
.trail {
  position: absolute;
  left: 20%;
  top: 40%;
  width: 20%;
  height: 20%;
}
.trail::before {
  content: "";
  position: absolute;
  inset: 17%;
  border-radius: 50%;
  border: 2px solid rgba(73, 55, 38, .32);
  box-shadow: 0 0 12px 3px rgba(218, 171, 82, .24);
  transform: scale(.78);
}
.control-dock {
  position: absolute;
  left: 50%;
  bottom: 68px;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
.hint,
.reset {
  width: 50px;
  height: 50px;
  border-radius: 16px;
}
.hint {
  position: relative;
  color: #8f6c36;
  border-color: rgba(151, 110, 50, .26);
}
.badge {
  position: absolute;
  top: -7px;
  right: -7px;
  min-width: 18px;
  height: 18px;
  padding: 0 4px;
  border-radius: 5px;
  font-size: 10px;
  font-weight: 700;
  line-height: 18px;
  text-align: center;
  background: #edd097;
  color: #342a1b;
  box-shadow: inset 0 1px 1px rgba(255,255,255,.7), 0 1px 2px rgba(80,58,18,.18);
}
.ad-slot {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 44px;
  border-top: 1px solid rgba(64,56,48,.10);
  background: linear-gradient(180deg, transparent, rgba(255,255,255,.42));
}
svg {
  width: 22px;
  height: 22px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}
@media (min-width: 760px) {
  .variants { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<h1>Warm Sand + Board Variants</h1>
<p class="lead">テーマ背景は Warm Sand に固定。盤だけ別系統にして、自然さと視認性を比較するモック。</p>
<main class="variants">
  <section class="variant">
    <div class="meta"><span class="name">A Sage Board</span><span class="tag">自然・読みやすい</span></div>
    <div class="screen sage"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">B Sky Board</span><span class="tag">分離が強い</span></div>
    <div class="screen sky"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">C Lavender Board</span><span class="tag">やわらかい個性</span></div>
    <div class="screen lavender"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">D Blue Gray Board</span><span class="tag">落ち着き重視</span></div>
    <div class="screen bluegray"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">E Clay Board</span><span class="tag">温かいが近似色</span></div>
    <div class="screen clay"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">F Graphite Board</span><span class="tag">最も締まる</span></div>
    <div class="screen graphite"></div>
  </section>
</main>
<template id="screen-template">
  <div class="topbar">
    <span class="round"><svg viewBox="0 0 24 24"><path d="M15 18 9 12l6-6"/></svg></span>
    <div class="status"><span class="no">#12</span><span class="count">1/4手詰</span><span class="answer">答え</span></div>
    <span class="round settings"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></svg></span>
  </div>
  <div class="boards">
    <div class="board"><div class="grid"></div><span class="goal g1"></span><span class="trail"></span><span class="ball b1"></span><span class="edge-glow"></span></div>
    <div class="board"><div class="grid"></div><span class="goal g2"></span><span class="ball b2"></span></div>
  </div>
  <div class="control-dock">
    <span class="reset"><svg viewBox="0 0 24 24"><path d="M4 7v5h5"/><path d="M5.8 16.1A7 7 0 1 0 6 7.8"/></svg></span>
    <span class="hint"><svg viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M8.5 14.5a5 5 0 1 1 7 0c-.8.7-1.2 1.4-1.3 2H9.8c-.1-.6-.5-1.3-1.3-2Z"/></svg><span class="badge">5</span></span>
  </div>
  <div class="ad-slot"></div>
</template>
<script>
const template = document.querySelector('#screen-template');
for (const screen of document.querySelectorAll('.screen')) {
  screen.append(template.content.cloneNode(true));
}
for (const grid of document.querySelectorAll('.grid')) {
  for (let i = 0; i < 25; i += 1) {
    const cell = document.createElement('div');
    cell.className = 'cell' + ([6, 14, 17].includes(i) ? ' wall' : '');
    grid.append(cell);
  }
}
</script>
</body>
</html>
