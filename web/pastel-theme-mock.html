<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tsugai wall style mock</title>
<style>
* { box-sizing: border-box; }
html, body { min-height: 100%; margin: 0; background: #f5efe5; color: #2d2a28; }
body {
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", system-ui, sans-serif;
  padding: 20px 14px 34px;
  background: radial-gradient(120% 100% at 50% 0%, #fff8ef 0%, #eadccf 78%);
}
h1 {
  max-width: 860px;
  margin: 0 auto 8px;
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 21px;
  font-weight: 500;
  letter-spacing: .12em;
  color: #5f5146;
}
.lead {
  max-width: 860px;
  margin: 0 auto 18px;
  color: #74685f;
  font-size: 13px;
  line-height: 1.7;
}
.variants {
  display: grid;
  gap: 18px;
  max-width: 860px;
  margin: 0 auto;
}
.variant { display: grid; gap: 8px; }
.meta {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: baseline;
}
.name { color: #51483f; font-size: 15px; letter-spacing: .08em; }
.tag { color: #80746a; font-size: 11px; letter-spacing: .06em; }
.screen {
  --piece-radius: 7px;
  --piece-inset: 12%;
  --piece-bg: linear-gradient(145deg, #f4dfc9 0%, #cf9d78 58%, #9e694f 100%);
  --piece-shadow: inset -2px -2px 0 rgba(82, 48, 34, .22), inset 2px 2px 0 rgba(255,255,255,.34), 0 7px 11px rgba(104, 65, 45, .27);
  --piece-outline: 1px solid rgba(87, 52, 38, .24);
  --piece-after: none;
  --ghost-radius: 7px;
  --ghost-inset: 12%;
  --ghost-transform: scale(.78);
  position: relative;
  height: 620px;
  border-radius: 16px;
  overflow: hidden;
  background: radial-gradient(120% 100% at 50% 0%, #fff8ef 0%, #eadccf 78%);
  border: 1px solid rgba(84, 76, 63, .13);
}
.soft-block {
  --piece-radius: 12px;
  --piece-inset: 14%;
  --piece-bg: linear-gradient(145deg, #fff4e7 0%, #f0c5ab 54%, #c98768 100%);
  --piece-shadow: inset -2px -3px 7px rgba(126, 75, 52, .34), inset 3px 3px 6px rgba(255,255,255,.5), 0 5px 9px rgba(126, 77, 52, .23);
  --ghost-radius: 12px;
  --ghost-inset: 14%;
}
.tile-block {
  --piece-radius: 8px;
  --piece-inset: 13%;
  --piece-bg: linear-gradient(150deg, #fff2df 0%, #eabf9f 47%, #bd795d 100%);
  --piece-shadow: inset -1px -1px 0 rgba(96, 57, 38, .18), inset 2px 2px 4px rgba(255,255,255,.48), 0 6px 10px rgba(126, 77, 52, .24);
  --piece-outline: 1px solid rgba(119, 70, 48, .24);
  --ghost-radius: 8px;
  --ghost-inset: 13%;
}
.marker-block {
  --piece-radius: 10px;
  --piece-inset: 13%;
  --piece-bg: linear-gradient(145deg, #ffefd8 0%, #e8bb8f 52%, #b97655 100%);
  --piece-shadow: inset -2px -3px 6px rgba(111, 63, 41, .34), inset 3px 3px 5px rgba(255,255,255,.48), 0 6px 10px rgba(126, 77, 52, .24);
  --piece-after: radial-gradient(circle, rgba(255,255,255,.72) 0 28%, transparent 31%);
  --ghost-radius: 10px;
  --ghost-inset: 13%;
}
.stone-block {
  --piece-radius: 7px;
  --piece-inset: 12%;
  --piece-bg: linear-gradient(145deg, #f4dfc9 0%, #cf9d78 58%, #9e694f 100%);
  --piece-shadow: inset -2px -2px 0 rgba(82, 48, 34, .22), inset 2px 2px 0 rgba(255,255,255,.34), 0 7px 11px rgba(104, 65, 45, .27);
  --piece-outline: 1px solid rgba(87, 52, 38, .24);
  --ghost-radius: 7px;
  --ghost-inset: 12%;
}
.outline-block {
  --piece-radius: 9px;
  --piece-inset: 12%;
  --piece-bg: linear-gradient(145deg, #fff4e8 0%, #edc5aa 50%, #c58365 100%);
  --piece-shadow: inset -2px -3px 7px rgba(126, 75, 52, .32), inset 3px 3px 6px rgba(255,255,255,.5), 0 5px 9px rgba(126, 77, 52, .23);
  --piece-outline: 2px solid rgba(89, 56, 40, .28);
  --ghost-radius: 9px;
  --ghost-inset: 12%;
}
.topbar {
  display: grid;
  grid-template-columns: 40px minmax(0, 1fr) 40px;
  align-items: center;
  gap: 8px;
  padding: 14px 14px 8px;
}
.round,
.answer,
.hint,
.reset {
  display: grid;
  place-items: center;
  color: #4d4842;
  background: linear-gradient(160deg, #f5e7dc 0%, #e3d1c2 100%);
  border: 1px solid rgba(64, 56, 48, .12);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.58);
}
.round {
  width: 34px;
  height: 34px;
  border-radius: 50%;
}
.settings { justify-self: end; }
.status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  white-space: nowrap;
}
.no {
  color: #8f6c36;
  font-size: 14px;
  letter-spacing: .05em;
  font-weight: 700;
}
.count {
  color: #4d4842;
  font-size: 14px;
  letter-spacing: .04em;
}
.answer {
  width: 48px;
  height: 34px;
  border-radius: 12px;
  color: #8f6c36;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .08em;
  border-color: rgba(151, 110, 50, .26);
}
.boards {
  display: grid;
  gap: clamp(18px, 3.5dvh, 34px);
  justify-items: center;
  padding-top: 8px;
}
.board {
  position: relative;
  width: min(260px, 70vw);
  aspect-ratio: 1;
  border-radius: 12px;
  overflow: hidden;
  background: linear-gradient(145deg, #f2e1d1 0%, #dcc5b3 100%);
  border: 1px solid rgba(64, 56, 48, .18);
  box-shadow: inset 0 1px 4px rgba(255,255,255,.72), inset 0 -8px 18px rgba(62,55,45,.06);
}
.grid {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
}
.cell {
  position: relative;
  border: .5px solid rgba(96, 70, 52, .14);
}
.wall {
  z-index: 1;
  background: linear-gradient(145deg, #d9c1aa 0%, #b5967c 55%, #8f725f 100%);
  border: 1px solid rgba(93, 68, 52, .24);
  box-shadow:
    inset 2px 2px 0 rgba(255,255,255,.28),
    inset -3px -4px 0 rgba(85, 57, 40, .16),
    0 4px 8px rgba(90, 61, 43, .18);
}
.wall::before {
  content: "";
  position: absolute;
  left: 7px;
  right: 9px;
  top: 6px;
  height: 2px;
  border-radius: 2px;
  background: rgba(255, 244, 227, .48);
}
.wall::after {
  content: "";
  position: absolute;
  right: 5px;
  bottom: 5px;
  width: 38%;
  height: 2px;
  border-radius: 2px;
  background: rgba(77, 51, 36, .22);
}
.stone-block .wall {
  background: linear-gradient(145deg, #d3b293 0%, #aa8267 56%, #7d5b4a 100%);
  border-color: rgba(72, 48, 36, .28);
  box-shadow:
    inset 2px 2px 0 rgba(255,255,255,.24),
    inset -3px -4px 0 rgba(69, 43, 31, .2),
    0 5px 9px rgba(83, 54, 39, .23);
}
.wall-soft .wall {
  background: linear-gradient(145deg, #dfc8b2 0%, #bea088 58%, #9d806c 100%);
  border-color: rgba(93, 68, 52, .18);
  box-shadow:
    inset 2px 2px 0 rgba(255,255,255,.22),
    inset -2px -3px 0 rgba(87, 58, 42, .12),
    0 3px 6px rgba(90, 61, 43, .13);
}
.wall-heavy .wall {
  background: linear-gradient(145deg, #d0ad8e 0%, #9f765d 54%, #715243 100%);
  border-color: rgba(62, 40, 30, .34);
  box-shadow:
    inset 2px 2px 0 rgba(255,248,232,.22),
    inset -5px -6px 0 rgba(55, 35, 26, .24),
    0 7px 12px rgba(74, 47, 34, .28);
}
.wall-outline .wall {
  background:
    linear-gradient(145deg, rgba(255,246,230,.36), transparent 35%),
    linear-gradient(145deg, #d8b999 0%, #b38a6e 60%, #87634f 100%);
  border: 2px solid rgba(82, 54, 39, .32);
  box-shadow:
    inset 0 0 0 3px rgba(255,239,211,.22),
    inset -3px -4px 0 rgba(75, 49, 36, .16),
    0 5px 9px rgba(83, 54, 39, .2);
}
.wall-cut .wall {
  background:
    linear-gradient(135deg, rgba(255,246,230,.45) 0 16%, transparent 17%),
    linear-gradient(315deg, rgba(74,48,34,.2) 0 18%, transparent 19%),
    linear-gradient(145deg, #d5b393 0%, #a98267 56%, #7b5a49 100%);
  border-color: rgba(72, 48, 36, .28);
  box-shadow:
    inset 2px 2px 0 rgba(255,255,255,.2),
    inset -3px -4px 0 rgba(69, 43, 31, .18),
    0 5px 9px rgba(83, 54, 39, .21);
}
.wall-cut .wall::before {
  left: 9px;
  right: 14px;
  opacity: .58;
}
.wall-cut .wall::after {
  right: 7px;
  bottom: 7px;
  width: 46%;
  opacity: .78;
}
.wall-slab .wall {
  background:
    linear-gradient(180deg, rgba(255,246,232,.38) 0 20%, transparent 21%),
    linear-gradient(145deg, #ccb198 0%, #a88a73 56%, #866b5a 100%);
  border-color: rgba(74, 52, 40, .26);
  box-shadow:
    inset 0 4px 0 rgba(255,248,235,.2),
    inset 0 -6px 0 rgba(67, 45, 34, .16),
    0 4px 8px rgba(83, 54, 39, .18);
}
.wall-slab .wall::before,
.wall-slab .wall::after {
  display: none;
}
.wall-minimal .wall {
  background: linear-gradient(145deg, #cdb39c 0%, #aa8c76 62%, #8c715f 100%);
  border-color: rgba(82, 59, 45, .22);
  box-shadow:
    inset 1px 1px 0 rgba(255,255,255,.2),
    inset -2px -2px 0 rgba(67, 45, 34, .12),
    0 3px 6px rgba(83, 54, 39, .13);
}
.wall-minimal .wall::before,
.wall-minimal .wall::after {
  opacity: .38;
}
.goal {
  position: absolute;
  left: 60%;
  top: 20%;
  width: 20%;
  height: 20%;
  border-radius: 10px;
  border: 2px dashed rgba(143, 108, 54, .62);
  box-shadow: 0 0 12px rgba(218, 171, 82, .28);
}
.board:nth-child(2) .goal { left: 20%; top: 60%; }
.piece {
  position: absolute;
  width: 20%;
  height: 20%;
}
.piece::before {
  content: "";
  position: absolute;
  inset: var(--piece-inset);
  border-radius: var(--piece-radius);
  background: var(--piece-bg);
  border: var(--piece-outline);
  box-shadow: var(--piece-shadow);
}
.piece::after {
  content: "";
  position: absolute;
  inset: 25%;
  border-radius: 999px;
  background: var(--piece-after);
}
.p1 { left: 20%; top: 40%; }
.p2 { left: 60%; top: 40%; }
.active .piece::before {
  outline: 2px solid rgba(255, 223, 158, .56);
  outline-offset: 2px;
}
.edge-glow {
  position: absolute;
  left: 40%;
  top: 40%;
  width: 20%;
  height: 4px;
  border-radius: 4px;
  background: #ffd996;
  box-shadow: 0 0 13px 4px rgba(218, 171, 82, .36);
  opacity: .94;
}
.trail {
  position: absolute;
  left: 20%;
  top: 40%;
  width: 20%;
  height: 20%;
}
.trail::before {
  content: "";
  position: absolute;
  inset: var(--ghost-inset);
  border-radius: var(--ghost-radius);
  border: 2px solid rgba(73, 55, 38, .3);
  box-shadow: 0 0 12px 3px rgba(218, 171, 82, .21);
  transform: var(--ghost-transform);
}
.move-mark {
  position: absolute;
  left: calc(20% + 22px);
  top: calc(40% - 8px);
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: rgba(255, 231, 178, .86);
  box-shadow: 0 0 12px rgba(218, 171, 82, .34);
}
.move-mark::before {
  content: "";
  position: absolute;
  left: 6px;
  top: 4px;
  width: 5px;
  height: 8px;
  border-right: 2px solid rgba(86, 61, 33, .58);
  border-bottom: 2px solid rgba(86, 61, 33, .58);
  transform: rotate(45deg);
}
.control-dock {
  position: absolute;
  left: 50%;
  bottom: 68px;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
.hint,
.reset {
  width: 50px;
  height: 50px;
  border-radius: 16px;
}
.hint {
  position: relative;
  color: #8f6c36;
  border-color: rgba(151, 110, 50, .26);
}
.badge {
  position: absolute;
  top: -7px;
  right: -7px;
  min-width: 18px;
  height: 18px;
  padding: 0 4px;
  border-radius: 5px;
  font-size: 10px;
  font-weight: 700;
  line-height: 18px;
  text-align: center;
  background: #edd097;
  color: #342a1b;
  box-shadow: inset 0 1px 1px rgba(255,255,255,.7), 0 1px 2px rgba(80,58,18,.18);
}
.ad-slot {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 44px;
  border-top: 1px solid rgba(64,56,48,.10);
  background: linear-gradient(180deg, transparent, rgba(255,255,255,.42));
}
svg {
  width: 22px;
  height: 22px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}
@media (min-width: 760px) {
  .variants { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<h1>Warm Sand + Wall Variants</h1>
<p class="lead">駒は Stone Block に固定。盤面の壁だけを変えて、障害物としての読みやすさと世界観の相性を比較するモック。</p>
<main class="variants">
  <section class="variant">
    <div class="meta"><span class="name">A Raised Stone</span><span class="tag">現行強化案</span></div>
    <div class="screen"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">B Soft Wall</span><span class="tag">やさしく馴染む</span></div>
    <div class="screen wall-soft"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">C Heavy Wall</span><span class="tag">障害物感が強い</span></div>
    <div class="screen wall-heavy"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">D Outline Wall</span><span class="tag">輪郭で読ませる</span></div>
    <div class="screen wall-outline"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">E Cut Stone</span><span class="tag">石材らしさ重視</span></div>
    <div class="screen wall-cut"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">F Low Slab</span><span class="tag">低めで上品</span></div>
    <div class="screen wall-slab"></div>
  </section>
  <section class="variant">
    <div class="meta"><span class="name">G Minimal Wall</span><span class="tag">情報量を抑える</span></div>
    <div class="screen wall-minimal"></div>
  </section>
</main>
<template id="screen-template">
  <div class="topbar">
    <span class="round"><svg viewBox="0 0 24 24"><path d="M15 18 9 12l6-6"/></svg></span>
    <div class="status"><span class="no">#12</span><span class="count">1/4手詰</span><span class="answer">答え</span></div>
    <span class="round settings"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></svg></span>
  </div>
  <div class="boards">
    <div class="board active"><div class="grid"></div><span class="goal"></span><span class="trail"></span><span class="piece p1"></span><span class="move-mark"></span><span class="edge-glow"></span></div>
    <div class="board"><div class="grid"></div><span class="goal"></span><span class="piece p2"></span></div>
  </div>
  <div class="control-dock">
    <span class="reset"><svg viewBox="0 0 24 24"><path d="M4 7v5h5"/><path d="M5.8 16.1A7 7 0 1 0 6 7.8"/></svg></span>
    <span class="hint"><svg viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M8.5 14.5a5 5 0 1 1 7 0c-.8.7-1.2 1.4-1.3 2H9.8c-.1-.6-.5-1.3-1.3-2Z"/></svg><span class="badge">5</span></span>
  </div>
  <div class="ad-slot"></div>
</template>
<script>
const template = document.querySelector('#screen-template');
for (const screen of document.querySelectorAll('.screen')) {
  screen.append(template.content.cloneNode(true));
}
for (const grid of document.querySelectorAll('.grid')) {
  for (let i = 0; i < 25; i += 1) {
    const cell = document.createElement('div');
    cell.className = 'cell' + ([6, 14, 17].includes(i) ? ' wall' : '');
    grid.append(cell);
  }
}
</script>
</body>
</html>
