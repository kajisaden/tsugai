<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lock Compare Mock</title>
<style>
:root {
  --bg: #f3efe6;
  --panel: #fbf8f1;
  --text: #2b2620;
  --text-dim: #8a8276;
  --gold: #a8801f;
  --logo: #29356c;
  --blue: #5874f0;
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  background: radial-gradient(120% 100% at 50% 0%, #fbf7ed 0%, var(--bg) 60%);
  color: var(--text);
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Noto Sans JP", sans-serif;
  -webkit-font-smoothing: antialiased;
}
header {
  display: grid;
  justify-items: center;
  padding: 30px 16px 10px;
}
h1 {
  margin: 0;
  color: var(--logo);
  font-family: "Inter", "Avenir Next", "Yu Gothic UI", sans-serif;
  font-size: 22px;
  font-weight: 800;
}
.note {
  width: min(680px, calc(100vw - 32px));
  margin: 8px auto 16px;
  color: var(--text-dim);
  font-size: 13px;
  line-height: 1.8;
}
.wrap {
  width: min(680px, calc(100vw - 32px));
  margin: 0 auto 40px;
  display: grid;
  gap: 14px;
}
.card {
  padding: 18px 18px 22px;
  border-radius: 24px;
  background: rgba(251, 248, 241, 0.72);
  border: 1px solid rgba(95, 75, 56, 0.12);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.56), 0 12px 28px rgba(70, 55, 30, 0.08);
}
.card h2 {
  margin: 0 0 16px;
  color: var(--logo);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 0.04em;
}
.compare {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}
.sample {
  display: grid;
  justify-items: center;
  gap: 10px;
  min-height: 270px;
  align-content: center;
  border-radius: 20px;
  border: 1px solid rgba(95, 75, 56, 0.08);
  background: rgba(255, 253, 248, 0.38);
}
.label {
  color: var(--logo);
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 0.05em;
}
.stage {
  width: 160px;
  height: 118px;
  display: grid;
  place-items: center;
  padding-bottom: 18px;
}
.level {
  width: 180px;
  display: grid;
  grid-template-columns: auto 3.2em;
  align-items: center;
  justify-content: center;
  column-gap: 0.35em;
  color: var(--blue);
  font-weight: 700;
  font-size: 22px;
  line-height: 1;
  letter-spacing: 0.04em;
  transform: translateX(14px);
}
.play {
  width: min(220px, 72vw);
  height: 52px;
  display: grid;
  place-items: center;
  margin-top: 14px;
  border-radius: 999px;
  color: #fff;
  background: linear-gradient(180deg, #6680ff 0%, #526df3 100%);
  box-shadow: 0 10px 18px rgba(82, 109, 243, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.28);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.08em;
}
.play.locked {
  color: rgba(41, 53, 108, 0.64);
  background: linear-gradient(180deg, rgba(232, 224, 208, 0.85), rgba(211, 202, 186, 0.72));
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
  font-size: 14px;
}
.emblem {
  position: relative;
  width: 124px;
  height: 99px;
}
.disc {
  position: absolute;
  left: 10px;
  top: 54px;
  width: 105px;
  height: 43px;
  border-radius: 11px;
  background: linear-gradient(180deg, rgba(234, 225, 209, 0.58), rgba(214, 203, 184, 0.42));
  border: 1px solid rgba(138, 120, 92, 0.10);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.34), 0 8px 11px rgba(64, 50, 30, 0.12);
}
.normal .disc {
  background: linear-gradient(180deg, rgba(234, 225, 209, 0.58), rgba(214, 203, 184, 0.42));
}
.block {
  position: absolute;
  width: 49px;
  height: 49px;
  border-radius: 13px;
  background: linear-gradient(145deg, #fafdff 0%, #b7ddec 52%, #72a8c4 100%);
  box-shadow:
    inset 2px 2px 0 rgba(255, 255, 255, 0.46),
    inset -3px -3px 0 rgba(74, 48, 35, 0.14),
    0 2px 4px rgba(92, 62, 45, 0.12);
}
.block::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  border: 2.5px solid rgba(74, 126, 154, 0.74);
}
.block::after {
  content: "";
  position: absolute;
  left: 10px;
  top: 8px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.54);
}
.locked .block {
  background: linear-gradient(145deg, #fafdff 0%, #e9f1f6 56%, #ccd8df 100%);
}
.locked .block::before {
  border-color: rgba(41, 53, 108, 0.32);
}
.back { left: 53px; top: 17px; z-index: 1; }
.front { left: 22px; top: 35px; z-index: 2; }
.shackle {
  position: absolute;
  width: 32px;
  height: 28px;
  border: 6px solid rgba(41, 53, 108, 0.28);
  border-bottom: 0;
  border-radius: 18px 18px 0 0;
  filter: drop-shadow(0 1px 0 rgba(255, 255, 255, 0.38));
}
.front-shackle { left: 30px; top: 17px; z-index: 1; }
.back-shackle { left: 61px; top: -1px; z-index: 0; }
.latch {
  position: absolute;
  z-index: 5;
  display: grid;
  gap: 4px;
}
.front-latch { left: 58px; top: 48px; }
.back-latch { left: 89px; top: 30px; }
.bar {
  width: 15px;
  height: 6px;
  border-radius: 3px;
  background: rgba(41, 53, 108, 0.32);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22);
}
.stem {
  position: absolute;
  width: 1.5px;
  height: 38px;
  top: -5px;
  right: 3px;
  background: rgba(41, 53, 108, 0.26);
  opacity: 0.48;
}
.rows {
  display: grid;
  gap: 14px;
}
.row-sample {
  display: grid;
  grid-template-columns: 120px 1fr;
  align-items: center;
  gap: 18px;
  padding: 18px;
  border-radius: 20px;
  border: 1px solid rgba(95, 75, 56, 0.08);
  background: rgba(255, 253, 248, 0.38);
}
.row-sample .stage { justify-self: center; }
.row-text {
  color: var(--text-dim);
  font-size: 13px;
  line-height: 1.7;
}
.row-text b {
  color: var(--logo);
  display: block;
  margin-bottom: 4px;
  font-size: 15px;
}
@media (max-width: 560px) {
  .compare { grid-template-columns: 1fr; }
  .row-sample { grid-template-columns: 1fr; justify-items: center; text-align: center; }
}
</style>
</head>
<body>
<header><h1>Tsugai</h1></header>
<p class="note">D案と通常エンブレムの比較。皿・ブロック座標は同じで、D案はロックパーツを重ねています。</p>

<main class="wrap">
  <section class="card">
    <h2>Home Comparison</h2>
    <div class="compare">
      <div class="sample">
        <div class="label">Locked D</div>
        <div class="stage">
          <div class="emblem locked">
            <div class="disc"></div>
            <div class="shackle back-shackle"></div><div class="block back"></div>
            <div class="shackle front-shackle"></div><div class="block front"></div>
            <div class="latch back-latch"><span class="stem"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
            <div class="latch front-latch"><span class="stem"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
          </div>
        </div>
        <div class="level"><span>レベル</span><span>6</span></div>
        <div class="play locked">レベル5 CLEARで開放</div>
      </div>
      <div class="sample">
        <div class="label">Normal</div>
        <div class="stage">
          <div class="emblem normal">
            <div class="disc"></div>
            <div class="block back"></div>
            <div class="block front"></div>
          </div>
        </div>
        <div class="level"><span>レベル</span><span>6</span></div>
        <div class="play">プレイ</div>
      </div>
    </div>
  </section>

  <section class="card">
    <h2>Same Coordinates</h2>
    <div class="rows">
      <div class="row-sample">
        <div class="stage">
          <div class="emblem locked">
            <div class="disc"></div>
            <div class="shackle back-shackle"></div><div class="block back"></div>
            <div class="shackle front-shackle"></div><div class="block front"></div>
            <div class="latch back-latch"><span class="stem"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
            <div class="latch front-latch"><span class="stem"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
          </div>
        </div>
        <div class="row-text"><b>Locked D</b>通常エンブレムの2ブロック位置は維持。取っ手・右ラッチだけを追加。</div>
      </div>
      <div class="row-sample">
        <div class="stage">
          <div class="emblem normal">
            <div class="disc"></div>
            <div class="block back"></div>
            <div class="block front"></div>
          </div>
        </div>
        <div class="row-text"><b>Normal</b>ロックパーツを外すとこの状態。解除アニメーションの終点。</div>
      </div>
    </div>
  </section>
</main>
</body>
</html>
