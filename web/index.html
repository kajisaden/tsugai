<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tsugai</title>
<!-- PWA: ホーム画面に追加すると Safari のバー無しで全画面起動する(本番=ネイティブ全画面のテスト用)。
     App Store 本体は別途ネイティブ化(Capacitor 等)が必要。これはテスト/ホーム画面配布用 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<!-- black-translucent: ステータスバーを透過にしてアプリ背景を上端まで広げる(白帯を消し本体に溶け込ませる)。
     コンテンツが時計/電池の下に回るので、ヘッダと盤計算で safe-area-inset-top を見込む -->
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tsugai">
<meta name="theme-color" content="#0a0a0e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<!-- テーマを CSS 適用前に確定してチラつきを防ぐ(既定=ダーク、保存があれば優先) -->
<script>try{if(localStorage.getItem('nikenzume.theme.v1')==='light')document.documentElement.dataset.theme='light';}catch(e){}</script>
<link rel="stylesheet" href="style.css?v=cb30b672c3">
</head>
<body>

<header id="app-header">
  <button id="btn-back" class="ghost" hidden><span class="chev">‹</span> <span data-i18n="back">戻る</span></button>
  <h1 id="app-title" data-i18n="title">Tsugai</h1>
  <button id="btn-theme" class="ghost btn-icon" data-i18n-aria="theme" aria-label="表示テーマ">
    <svg class="ic-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
         stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
    </svg>
    <svg class="ic-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
         stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>
    </svg>
  </button>
</header>

<main>
  <!-- 章一覧 -->
  <section id="view-chapters">
    <p class="tagline" data-i18n="tagline">ふたつの部屋、ひとつの操作。</p>
    <div id="chapter-list"></div>
  </section>

  <!-- 問題一覧 -->
  <section id="view-levels" hidden>
    <h2 id="levels-title"></h2>
    <div id="level-grid"></div>
  </section>

  <!-- プレイ画面 -->
  <section id="view-play" hidden>
    <div id="play-info">
      <span id="puzzle-label"></span>
      <span id="move-count"></span>
    </div>
    <div id="boards"></div>
    <div id="controls">
      <button id="btn-undo" class="ghost" data-i18n="undo">待った</button>
      <button id="btn-reset" class="ghost" data-i18n="reset">初形</button>
      <button id="btn-answer-open" class="ghost" data-i18n="answer">答え</button>
    </div>
    <!-- ヒントはオン/オフ設定(全問持続)。開く手間なくプレイ画面に常駐 -->
    <div id="hint-toggles">
      <button id="tg-light" class="toggle" aria-pressed="false" data-i18n="light">光で示す</button>
      <button id="tg-next" class="toggle" aria-pressed="false" data-i18n="nextMove">次の一手</button>
    </div>
    <button id="btn-next-move" class="ghost" hidden data-i18n="showNextMove">次の一手を見る</button>
    <!-- 答えビューア: 再生(自動)ボタン + ◀▶ で一手ずつ -->
    <div id="answer-bar" hidden>
      <button id="btn-ans-play" data-i18n="play">再生</button>
      <button id="btn-ans-prev" class="ghost" data-i18n-aria="prev" aria-label="前へ">◀</button>
      <span id="ans-progress">0 / 0</span>
      <button id="btn-ans-next" class="ghost" data-i18n-aria="next" aria-label="次へ">▶</button>
      <button id="btn-ans-close" class="ghost" data-i18n="close">とじる</button>
    </div>
    <p id="hint-keys" data-i18n="controlsHint">矢印キー / スワイプで両方の部屋が動く</p>
  </section>
</main>

<!-- 次の一手: 盤の上に方向を静かに一瞬示す -->
<div id="hint-arrow" hidden><span class="arrow-mark"></span><span class="arrow-sub"></span></div>

<!-- クリア演出(約1秒): 盤上のボールが金(最短)/白(クリア)に光って弾む。タップで早送りして A画面(切れ目)へ -->
<div id="overlay-tsumi" hidden>
  <span class="tsumi-sub" data-i18n="tapNext">タップで次へ</span>
</div>

<!-- 反則(同時でないのにゴールへ入った): 初手から戻してやり直す -->
<div id="overlay-miss" hidden>
  <p class="miss-note" data-i18n="missNote">ゴールは、ふたつ同時でなければ開かない</p>
  <button id="btn-miss-restart" data-i18n="restart">初手から</button>
</div>

<!-- 問題間の切れ目 = A画面(クリア結果＋次へ)。SPEC.md 6章の広告差し込み口もここ(盤面は聖域) -->
<div id="overlay-gap" hidden>
  <button id="btn-list" class="ghost btn-icon" data-i18n-aria="levels" aria-label="一覧へ">
    <svg class="ic-home" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
         stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M4 11 12 4l8 7"/>
      <path d="M6 10v9a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-9"/>
    </svg>
  </button>
  <!-- A画面の中身はカードに載せる。カード=ゲーム盤の壁デザインを大きくして角丸にしたもの(テーマ追従) -->
  <div class="gap-card">
    <div class="gap-result">
      <p class="gap-moves" id="gap-moves"><span id="gap-moves-1"></span><span id="gap-moves-2"></span></p>
      <!-- つがいエンブレム: 2球が45°で寄り添う。ダーク=発光 / ライト=碁石＋金(最短)/銀(クリア)の楕円皿 -->
      <div class="emblem" id="gap-emblem">
        <div class="emblem-halo"></div>
        <div class="emblem-disc"></div>
        <div class="emblem-balls">
          <div class="emblem-ball eb1"></div>
          <div class="emblem-ball eb2"></div>
        </div>
      </div>
      <p class="gap-progress" id="gap-progress"></p>
    </div>
    <div class="gap-buttons">
      <button id="btn-next" data-i18n="nextPuzzle">次の問題へ</button>
      <button id="btn-retry" class="ghost" data-i18n="retryAgain">もう一度</button>
    </div>
  </div>
  <!-- AD SLOT: 広告は別インタースティシャル想定(A画面はカードに集約) -->
</div>

<script src="pool.js?v=b15ee5deb3"></script>
<script src="strings.js?v=164d0e9dbc"></script>
<script src="app.js?v=0b191d6c79"></script>
</body>
</html>
