<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tsugai</title>
<!-- PWA: ホーム画面に追加すると Safari のバー無しで全画面起動する(本番=ネイティブ全画面のテスト用)。
     App Store 本体は別途ネイティブ化(Capacitor 等)が必要。これはテスト/ホーム画面配布用 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<!-- black-translucent: ステータスバーを透過にしてアプリ背景を上端まで広げる(白帯を消し本体に溶け込ませる)。
     コンテンツが時計/電池の下に回るので、ヘッダと盤計算で safe-area-inset-top を見込む -->
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tsugai">
<meta name="theme-color" content="#0a0a0e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<!-- テーマを CSS 適用前に確定してチラつきを防ぐ(既定=ダーク、保存があれば優先) -->
<script>try{if(localStorage.getItem('nikenzume.theme.v1')==='light')document.documentElement.dataset.theme='light';}catch(e){}</script>
<link rel="stylesheet" href="style.css?v=b1583e0a36">
</head>
<body>

<header id="app-header">
  <!-- 左グループ: 戻る + テーマトグル。右(hdr-right)は後で設定ボタンを入れる -->
  <div class="hdr-left">
    <!-- 戻る = 盤色の丸ボタン(シェブロン)。左端は「○手詰」と揃う -->
    <button id="btn-back" data-i18n-aria="back" aria-label="戻る" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <!-- テーマトグル(案C): 太陽(ライト)/月(ダーク)を埋め込んだスライド式。アクティブ側が金で点灯 -->
    <button id="btn-theme" data-i18n-aria="theme" aria-label="表示テーマ">
      <span class="ic-wrap sun-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
      </span>
      <span class="ic-wrap moon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>
        </svg>
      </span>
    </button>
  </div>
  <h1 id="app-title" data-i18n="title">Tsugai</h1>
  <!-- 右スロット: 設定(歯車)。戻る(左)と対の盤色丸。右端は「○手」と揃う。中身の設定画面は別途 -->
  <div class="hdr-right">
    <button id="btn-settings" data-i18n-aria="settings" aria-label="設定">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</header>

<main>
  <!-- 章一覧 -->
  <section id="view-chapters">
    <p class="tagline" data-i18n="tagline">ふたつの部屋、ひとつの操作。</p>
    <div id="chapter-list"></div>
  </section>

  <!-- 問題一覧 -->
  <section id="view-levels" hidden>
    <h2 id="levels-title"></h2>
    <div id="level-grid"></div>
  </section>

  <!-- プレイ画面 -->
  <section id="view-play" hidden>
    <div id="play-info">
      <span id="puzzle-label"></span>
      <span id="move-count"></span>
    </div>
    <div id="boards"></div>
    <!-- 操作系: 上段=ヘルプ(リワード広告・残数バッジ) / 下段=最初から(無料・最頻・フル幅)。
         残数(光5/次の手10/日)は角丸の金バッジ、0で▶。答えは毎回▶。待った(一手戻る)は廃止 -->
    <div id="controls">
      <div id="hint-row">
        <button id="btn-hint-light" class="help"><span data-i18n="light">光ヒント</span><span class="hint-badge"></span></button>
        <button id="btn-hint-next" class="help"><span data-i18n="nextMove">次の手ヒント</span><span class="hint-badge"></span></button>
        <button id="btn-answer-open" class="help"><span data-i18n="answer">答え</span><span class="hint-badge ad">▶</span></button>
      </div>
      <button id="btn-reset" class="reset-btn" data-i18n="reset">最初から</button>
    </div>
    <!-- 答えビューア: 再生(自動)ボタン + ◀▶ で一手ずつ -->
    <div id="answer-bar" hidden>
      <button id="btn-ans-play" data-i18n="play">再生</button>
      <button id="btn-ans-prev" class="ghost" data-i18n-aria="prev" aria-label="前へ">◀</button>
      <span id="ans-progress">0 / 0</span>
      <button id="btn-ans-next" class="ghost" data-i18n-aria="next" aria-label="次へ">▶</button>
      <button id="btn-ans-close" class="ghost" data-i18n="close">とじる</button>
    </div>
    <p id="hint-keys" data-i18n="controlsHint">矢印キー / スワイプで両方の部屋が動く</p>
  </section>
</main>

<!-- 次の一手: 盤の上に方向を静かに一瞬示す -->
<div id="hint-arrow" hidden><span class="arrow-mark"></span><span class="arrow-sub"></span></div>

<!-- 反則(同時でないのにゴールへ入った): 初手から戻してやり直す -->
<div id="overlay-miss" hidden>
  <p class="miss-note" data-i18n="missNote">ゴールは、ふたつ同時でなければ開かない</p>
  <button id="btn-miss-restart" data-i18n="restart">初手から</button>
</div>

<!-- 問題間の切れ目 = A画面(クリア結果＋次へ)。SPEC.md 6章の広告差し込み口もここ(盤面は聖域) -->
<div id="overlay-gap" hidden>
  <button id="btn-list" class="ghost btn-icon" data-i18n-aria="levels" aria-label="一覧へ">
    <svg class="ic-home" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
         stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M4 11 12 4l8 7"/>
      <path d="M6 10v9a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-9"/>
    </svg>
  </button>
  <!-- A画面の中身はカードに載せる。カード=ゲーム盤の壁デザインを大きくして角丸にしたもの(テーマ追従) -->
  <div class="gap-card">
    <div class="gap-result">
      <p class="gap-moves" id="gap-moves"><span id="gap-moves-1"></span><span id="gap-moves-2"></span></p>
      <!-- つがいエンブレム: 2球が45°で寄り添う。ダーク=発光 / ライト=碁石＋金(最短)/銀(クリア)の楕円皿 -->
      <div class="emblem" id="gap-emblem">
        <div class="emblem-halo"></div>
        <div class="emblem-disc"></div>
        <div class="emblem-balls">
          <div class="emblem-ball eb1"></div>
          <div class="emblem-ball eb2"></div>
        </div>
      </div>
      <p class="gap-progress" id="gap-progress"></p>
    </div>
    <div class="gap-buttons">
      <button id="btn-next" data-i18n="nextPuzzle">次の問題へ</button>
      <button id="btn-retry" class="ghost" data-i18n="retryAgain">もう一度</button>
    </div>
  </div>
  <!-- AD SLOT: 広告は別インタースティシャル想定(A画面はカードに集約) -->
</div>

<script src="pool.js?v=b15ee5deb3"></script>
<script src="strings.js?v=524672c6ee"></script>
<script src="app.js?v=67a91f199a"></script>
</body>
</html>
