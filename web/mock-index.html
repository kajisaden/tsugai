<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tsugai mock index</title>
<style>
:root {
  --bg: #f4efe6;
  --panel: #fbf7f0;
  --text: #3f352c;
  --dim: #7f7468;
  --line: rgba(84, 72, 61, 0.12);
  --accent: #5a4a39;
}
* { box-sizing: border-box; }
html, body { min-height: 100%; margin: 0; background: var(--bg); color: var(--text); }
body {
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", system-ui, sans-serif;
  padding: 28px 18px 40px;
}
main {
  max-width: 760px;
  margin: 0 auto;
}
h1 {
  margin: 0 0 8px;
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 24px;
  font-weight: 400;
  letter-spacing: 0.12em;
  color: var(--accent);
}
.lead {
  margin: 0 0 22px;
  color: var(--dim);
  font-size: 13px;
  line-height: 1.7;
}
.list {
  display: grid;
  gap: 12px;
}
a.item {
  display: block;
  padding: 14px 16px;
  border-radius: 12px;
  background: var(--panel);
  border: 1px solid var(--line);
  text-decoration: none;
  color: inherit;
  box-shadow: 0 8px 24px rgba(88, 66, 45, 0.05);
}
.title {
  font-size: 15px;
  color: var(--accent);
  letter-spacing: 0.04em;
}
.desc {
  margin-top: 4px;
  font-size: 12px;
  color: var(--dim);
  line-height: 1.6;
}
</style>
</head>
<body>
<main>
  <h1>Mock Index</h1>
  <p class="lead">検討用モックへの導線です。今回の影確認は先頭の Trail Shadow Mock から開けます。</p>

  <section class="list">
    <a class="item" href="./trail-shadow-mock.html">
      <div class="title">Trail Shadow Mock</div>
      <div class="desc">移動トレイルの影だけを、丸影とボールブロック影で見比べる。</div>
    </a>
    <a class="item" href="./trail-variants.html">
      <div class="title">Trail Variants</div>
      <div class="desc">通り道の余韻表現を複数パターンで比較する。</div>
    </a>
    <a class="item" href="./trail-ghost-variants.html">
      <div class="title">Ball Ghost Variants</div>
      <div class="desc">ボール残像の方向性を、球影中心で見比べる。</div>
    </a>
    <a class="item" href="./minimal-play-mock.html">
      <div class="title">Minimal Play Mock</div>
      <div class="desc">プレイ画面全体の軽量モック。</div>
    </a>
  </section>
</main>
</body>
</html>
