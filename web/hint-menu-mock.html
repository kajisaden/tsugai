<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tsugai hint menu mock</title>
<style>
* { box-sizing: border-box; }
html, body { min-height: 100%; margin: 0; background: #0a0a0e; color: #d8d4ca; }
body {
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", system-ui, sans-serif;
  padding: 22px 14px 34px;
}
h1 {
  max-width: 760px;
  margin: 0 auto 8px;
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 22px;
  font-weight: 400;
  letter-spacing: .16em;
  color: #e8d9b0;
}
.lead {
  max-width: 760px;
  margin: 0 auto 18px;
  color: #9d9a8e;
  font-size: 13px;
  line-height: 1.7;
}
.mocks {
  display: grid;
  gap: 18px;
  max-width: 760px;
  margin: 0 auto;
}
.mock { display: grid; gap: 8px; }
.meta {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: baseline;
}
.name { color: #e8d9b0; font-size: 15px; letter-spacing: .08em; }
.tag { color: #9d9a8e; font-size: 11px; letter-spacing: .06em; }
.screen {
  position: relative;
  height: 520px;
  border-radius: 14px;
  overflow: hidden;
  background: radial-gradient(120% 100% at 50% 0%, #101018 0%, #0a0a0e 64%);
  border: 1px solid rgba(255,255,255,.06);
}
.header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 18px 16px 8px;
}
.round {
  width: 32px;
  height: 32px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: radial-gradient(120% 120% at 50% 42%, #32323f 0%, #1e1e27 72%);
  border: 1px solid rgba(255,255,255,.08);
  color: #9d9a8e;
}
.title {
  grid-column: 2;
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 21px;
  letter-spacing: .42em;
  text-indent: .42em;
  color: #e8d9b0;
}
.gear { justify-self: end; }
.play-info {
  display: flex;
  justify-content: space-between;
  padding: 8px 18px 10px;
  color: #9d9a8e;
  font-size: 13px;
  letter-spacing: .08em;
}
.boards {
  display: grid;
  gap: 24px;
  justify-items: center;
}
.board {
  position: relative;
  width: min(228px, 70vw);
  aspect-ratio: 1;
  border-radius: 12px;
  overflow: hidden;
  background: radial-gradient(120% 120% at 50% 42%, #32323f 0%, #1e1e27 72%);
  border: 1px solid rgba(255,255,255,.11);
  box-shadow: inset 0 2px 9px rgba(0,0,0,.55);
}
.grid {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
}
.cell { border: .5px solid rgba(255,255,255,.07); }
.wall { background: linear-gradient(160deg, #4a4a57 0%, #3a3a45 100%); }
.goal {
  position: absolute;
  width: 20%;
  height: 20%;
  border-radius: 50%;
  border: 2px dashed rgba(232,217,176,.68);
  box-shadow: 0 0 12px rgba(240,220,170,.3);
}
.g1 { left: 60%; top: 20%; }
.g2 { left: 20%; top: 60%; }
.ball {
  position: absolute;
  width: 20%;
  height: 20%;
}
.ball::before {
  content: "";
  position: absolute;
  inset: 17%;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, #fffdf6 0%, #f3e3bd 45%, #c9b585 100%);
  box-shadow: 0 0 12px rgba(240,220,170,.42);
}
.b1 { left: 20%; top: 40%; }
.b2 { left: 60%; top: 40%; }
.controls {
  position: absolute;
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);
  display: grid;
  justify-items: center;
  gap: 12px;
}
.hint-root {
  position: relative;
  width: 52px;
  height: 52px;
}
.bulb,
.reset,
.choice {
  display: grid;
  place-items: center;
  color: #d8d4ca;
  background: radial-gradient(120% 120% at 50% 42%, #32323f 0%, #1e1e27 72%);
  border: 1px solid rgba(255,255,255,.1);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 8px 18px rgba(0,0,0,.22);
}
.bulb {
  position: absolute;
  inset: 0;
  border-radius: 15px;
  color: #e8d9b0;
  border-color: rgba(232,217,176,.28);
}
.reset {
  width: 152px;
  height: 42px;
  border-radius: 12px;
  background: transparent;
  border-color: rgba(255,255,255,.28);
  box-shadow: none;
}
svg {
  width: 22px;
  height: 22px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.play svg { fill: currentColor; stroke: none; transform: translateX(1px); }
.badge {
  position: absolute;
  top: -7px;
  right: -7px;
  min-width: 18px;
  height: 18px;
  padding: 0 4px;
  border-radius: 5px;
  font-size: 10px;
  font-weight: 700;
  line-height: 18px;
  text-align: center;
  background: #e8d9b0;
  color: #16161d;
}
.expanded .choice {
  position: absolute;
  left: 50%;
  width: 46px;
  height: 46px;
  border-radius: 14px;
  transform: translateX(-50%);
}
.expanded .c-wall { bottom: 168px; }
.expanded .c-next { bottom: 112px; }
.expanded .c-answer { bottom: 56px; }
.expanded .rail {
  position: absolute;
  left: 50%;
  bottom: 48px;
  width: 1px;
  height: 174px;
  transform: translateX(-50%);
  background: linear-gradient(180deg, transparent, rgba(232,217,176,.24), transparent);
}
.expanded .label {
  position: absolute;
  left: 56px;
  white-space: nowrap;
  color: #9d9a8e;
  font-size: 11px;
  letter-spacing: .06em;
}
.expanded .c-wall .label { top: 15px; }
.expanded .c-next .label { top: 15px; }
.expanded .c-answer .label { top: 15px; }
.fan .choice {
  position: absolute;
  width: 46px;
  height: 46px;
  border-radius: 14px;
}
.fan .c-wall { left: -72px; bottom: 64px; }
.fan .c-next { left: 3px; bottom: 92px; }
.fan .c-answer { right: -72px; bottom: 64px; }
.fan .choice .label { display: none; }
.fan .arc {
  position: absolute;
  left: 50%;
  bottom: 26px;
  width: 176px;
  height: 88px;
  transform: translateX(-50%);
  border-top: 1px solid rgba(232,217,176,.18);
  border-radius: 999px 999px 0 0;
}
@media (min-width: 760px) {
  .mocks { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<h1>Hint Menu Mock</h1>
<p class="lead">ヒント系を電球1つに畳んだ場合の見え方。左は縦メニュー、右は扇状メニュー。</p>
<main class="mocks">
  <section class="mock">
    <div class="meta"><span class="name">A 縦に展開</span><span class="tag">説明ラベルあり</span></div>
    <div class="screen">
      <div class="header"><div class="round">‹</div><div class="title">Tsugai</div><div class="round gear">⚙</div></div>
      <div class="play-info"><span>#12 4手詰</span><span>2手</span></div>
      <div class="boards">
        <div class="board"><div class="grid"></div><span class="goal g1"></span><span class="ball b1"></span></div>
        <div class="board"><div class="grid"></div><span class="goal g2"></span><span class="ball b2"></span></div>
      </div>
      <div class="controls expanded">
        <div class="hint-root">
          <div class="rail"></div>
          <div class="choice c-wall"><svg viewBox="0 0 24 24"><path d="M12 3v3"/><path d="M12 18v3"/><path d="M3 12h3"/><path d="M18 12h3"/><circle cx="12" cy="12" r="3.4"/></svg><span class="badge">5</span><span class="label">壁</span></div>
          <div class="choice c-next"><svg viewBox="0 0 24 24"><path d="M5 12h13"/><path d="m13 6 6 6-6 6"/></svg><span class="badge">10</span><span class="label">次</span></div>
          <div class="choice c-answer play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><span class="badge">▶</span><span class="label">答え</span></div>
          <div class="bulb"><svg viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M8.5 14.5a5 5 0 1 1 7 0c-.8.7-1.2 1.4-1.3 2H9.8c-.1-.6-.5-1.3-1.3-2Z"/></svg></div>
        </div>
        <div class="reset"><svg viewBox="0 0 24 24"><path d="M4 7v5h5"/><path d="M5.8 16.1A7 7 0 1 0 6 7.8"/></svg></div>
      </div>
    </div>
  </section>
  <section class="mock">
    <div class="meta"><span class="name">B 扇状に展開</span><span class="tag">テキストなし</span></div>
    <div class="screen">
      <div class="header"><div class="round">‹</div><div class="title">Tsugai</div><div class="round gear">⚙</div></div>
      <div class="play-info"><span>#12 4手詰</span><span>2手</span></div>
      <div class="boards">
        <div class="board"><div class="grid"></div><span class="goal g1"></span><span class="ball b1"></span></div>
        <div class="board"><div class="grid"></div><span class="goal g2"></span><span class="ball b2"></span></div>
      </div>
      <div class="controls fan">
        <div class="hint-root">
          <div class="arc"></div>
          <div class="choice c-wall"><svg viewBox="0 0 24 24"><path d="M12 3v3"/><path d="M12 18v3"/><path d="M3 12h3"/><path d="M18 12h3"/><circle cx="12" cy="12" r="3.4"/></svg><span class="badge">5</span><span class="label">壁</span></div>
          <div class="choice c-next"><svg viewBox="0 0 24 24"><path d="M5 12h13"/><path d="m13 6 6 6-6 6"/></svg><span class="badge">10</span><span class="label">次</span></div>
          <div class="choice c-answer play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><span class="badge">▶</span><span class="label">答え</span></div>
          <div class="bulb"><svg viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M8.5 14.5a5 5 0 1 1 7 0c-.8.7-1.2 1.4-1.3 2H9.8c-.1-.6-.5-1.3-1.3-2Z"/></svg></div>
        </div>
        <div class="reset"><svg viewBox="0 0 24 24"><path d="M4 7v5h5"/><path d="M5.8 16.1A7 7 0 1 0 6 7.8"/></svg></div>
      </div>
    </div>
  </section>
</main>
<script>
for (const grid of document.querySelectorAll('.grid')) {
  for (let i = 0; i < 25; i += 1) {
    const cell = document.createElement('div');
    cell.className = 'cell' + ([6, 14, 17].includes(i) ? ' wall' : '');
    grid.append(cell);
  }
}
</script>
</body>
</html>
