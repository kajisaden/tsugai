<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tsugai minimal play mock</title>
<style>
* { box-sizing: border-box; }
html, body { min-height: 100%; margin: 0; background: #0a0a0e; color: #d8d4ca; }
body {
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", system-ui, sans-serif;
  padding: 20px 14px 34px;
}
h1 {
  max-width: 380px;
  margin: 0 auto 8px;
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 20px;
  font-weight: 400;
  letter-spacing: .12em;
  color: #e8d9b0;
}
.lead {
  max-width: 380px;
  margin: 0 auto 16px;
  color: #9d9a8e;
  font-size: 13px;
  line-height: 1.7;
}
.screen {
  position: relative;
  width: min(390px, 100%);
  height: 720px;
  margin: 0 auto;
  border-radius: 16px;
  overflow: hidden;
  background: radial-gradient(120% 100% at 50% 0%, #101018 0%, #0a0a0e 64%);
  border: 1px solid rgba(255,255,255,.06);
}
.topbar {
  display: grid;
  grid-template-columns: 40px minmax(0, 1fr) 40px;
  align-items: center;
  gap: 8px;
  padding: 14px 14px 8px;
}
.round,
.answer,
.hint,
.reset {
  display: grid;
  place-items: center;
  color: #d8d4ca;
  background: radial-gradient(120% 120% at 50% 42%, #32323f 0%, #1e1e27 72%);
  border: 1px solid rgba(255,255,255,.1);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
}
.round {
  width: 34px;
  height: 34px;
  border-radius: 50%;
}
.settings { justify-self: end; }
.status {
  min-width: 0;
  justify-self: center;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  white-space: nowrap;
}
.no {
  color: #e8d9b0;
  font-size: 14px;
  letter-spacing: .05em;
}
.count {
  color: #d8d4ca;
  font-size: 14px;
  letter-spacing: .04em;
}
.answer {
  width: 48px;
  height: 34px;
  border-radius: 12px;
  color: #e8d9b0;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .08em;
  border-color: rgba(232,217,176,.25);
}
.boards {
  display: grid;
  gap: 26px;
  justify-items: center;
  padding-top: 8px;
}
.board {
  position: relative;
  width: min(260px, 70vw);
  aspect-ratio: 1;
  border-radius: 12px;
  overflow: hidden;
  background: radial-gradient(120% 120% at 50% 42%, #32323f 0%, #1e1e27 72%);
  border: 1px solid rgba(255,255,255,.11);
  box-shadow: inset 0 2px 9px rgba(0,0,0,.55);
}
.grid {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
}
.cell { border: .5px solid rgba(255,255,255,.07); }
.wall { background: linear-gradient(160deg, #4a4a57 0%, #3a3a45 100%); }
.goal {
  position: absolute;
  width: 20%;
  height: 20%;
  border-radius: 50%;
  border: 2px dashed rgba(232,217,176,.68);
  box-shadow: 0 0 12px rgba(240,220,170,.3);
}
.g1 { left: 60%; top: 20%; }
.g2 { left: 20%; top: 60%; }
.ball {
  position: absolute;
  width: 20%;
  height: 20%;
}
.ball::before {
  content: "";
  position: absolute;
  inset: 17%;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, #fffdf6 0%, #f3e3bd 45%, #c9b585 100%);
  box-shadow: 0 0 12px rgba(240,220,170,.42);
}
.b1 { left: 20%; top: 40%; }
.b2 { left: 60%; top: 40%; }
.edge-glow {
  position: absolute;
  left: 40%;
  top: 40%;
  width: 20%;
  height: 4px;
  background: #fffaf0;
  box-shadow: 0 0 18px 6px rgba(240,220,170,.55);
  opacity: .9;
}
.control-dock {
  position: absolute;
  left: 50%;
  bottom: 78px;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
}
.hint,
.reset {
  width: 54px;
  height: 54px;
  border-radius: 16px;
}
.hint {
  position: relative;
  color: #e8d9b0;
  border-color: rgba(232,217,176,.3);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.12),
    0 0 18px 4px rgba(240,220,170,.12);
}
.reset {
  color: #9d9a8e;
  background: transparent;
  border-color: rgba(255,255,255,.24);
  box-shadow: none;
}
.badge {
  position: absolute;
  top: -7px;
  right: -7px;
  min-width: 18px;
  height: 18px;
  padding: 0 4px;
  border-radius: 5px;
  font-size: 10px;
  font-weight: 700;
  line-height: 18px;
  text-align: center;
  background: #e8d9b0;
  color: #16161d;
}
.ad-slot {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 58px;
  display: grid;
  place-items: center;
  color: rgba(157,154,142,.7);
  font-size: 11px;
  letter-spacing: .08em;
  background:
    linear-gradient(180deg, rgba(10,10,14,0), rgba(10,10,14,.76) 24%),
    rgba(255,255,255,.035);
  border-top: 1px solid rgba(255,255,255,.07);
}
.answer svg { display: none; }
svg {
  width: 22px;
  height: 22px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}
</style>
</head>
<body>
<h1>Minimal Play Mock</h1>
<p class="lead">ヘッダー中央に問題情報と答え、下部中央に戻る/ヒント、最下部に広告枠を残す案。</p>
<main class="screen">
  <header class="topbar">
    <div class="round"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18 9 12l6-6"/></svg></div>
    <div class="status">
      <span class="no">#12</span>
      <span class="count">1/4手詰</span>
      <span class="answer">答え</span>
    </div>
    <div class="round settings"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
  </header>

  <section class="boards">
    <div class="board"><div class="grid"></div><span class="goal g1"></span><span class="ball b1"></span><span class="edge-glow"></span></div>
    <div class="board"><div class="grid"></div><span class="goal g2"></span><span class="ball b2"></span></div>
  </section>

  <div class="control-dock">
    <div class="reset"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7v5h5"/><path d="M5.8 16.1A7 7 0 1 0 6 7.8"/></svg></div>
    <div class="hint"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M8.5 14.5a5 5 0 1 1 7 0c-.8.7-1.2 1.4-1.3 2H9.8c-.1-.6-.5-1.3-1.3-2Z"/></svg><span class="badge">5</span></div>
  </div>

  <div class="ad-slot">banner ad area</div>
</main>
<script>
for (const grid of document.querySelectorAll('.grid')) {
  for (let i = 0; i < 25; i += 1) {
    const cell = document.createElement('div');
    cell.className = 'cell' + ([6, 14, 17].includes(i) ? ' wall' : '');
    grid.append(cell);
  }
}
</script>
</body>
</html>
