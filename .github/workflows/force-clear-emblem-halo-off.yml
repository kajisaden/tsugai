name: Force clear emblem halo off

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Force halo off and bust CSS cache
        run: |
          python3 <<'PY'
          from pathlib import Path

          p = Path('web/index.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace("var V='119'", "var V='120'")
          s = s.replace('id="build-mark" aria-hidden="true">119</span>', 'id="build-mark" aria-hidden="true">120</span>')
          s = s.replace('style.css?v=e8eb54a94c', 'style.css?v=halooff120')

          needle = '#btn-home:active { transform: translateY(1px); }\n'
          inject = needle + '.emblem-halo,\n#gap-emblem .emblem-halo,\n#gap-emblem.best .emblem-halo,\n#gap-emblem.win .emblem-halo {\n  display: none !important;\n  opacity: 0 !important;\n  background: none !important;\n  filter: none !important;\n}\n'
          if '.emblem-halo,' not in s:
            s = s.replace(needle, inject)

          p.write_text(s, encoding='utf-8')

          for q in [Path('.github/workflows/force-clear-emblem-halo-off.yml'), Path('.github/force-clear-emblem-halo-off.trigger')]:
            if q.exists():
              q.unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/index.html .github/workflows/force-clear-emblem-halo-off.yml .github/force-clear-emblem-halo-off.trigger
          git commit -m "Force clear-screen emblem halo off" || exit 0
          git push
