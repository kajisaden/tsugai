name: Bump build mark once

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump index build mark
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('web/index.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace("var V='113'", "var V='115'")
          s = s.replace('id="build-mark" aria-hidden="true">114</span>', 'id="build-mark" aria-hidden="true">115</span>')
          p.write_text(s, encoding='utf-8')
          for q in [Path('.github/workflows/bump-build-mark-once.yml'), Path('.github/bump-build-mark.trigger')]:
            if q.exists(): q.unlink()
          PY
      - name: Commit bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/index.html .github/workflows/bump-build-mark-once.yml .github/bump-build-mark.trigger
          git commit -m "Bump build mark" || exit 0
          git push
