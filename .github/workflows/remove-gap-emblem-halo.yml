name: Remove gap emblem halo

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove clear-screen emblem halo and bump build mark
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          style_path = Path('web/style.css')
          s = style_path.read_text(encoding='utf-8')

          s = s.replace(
              '/* 後光(halo): エンブレム背後の温かなオーラ。状態別に後段で表示する */',
              '/* 後光(halo): エンブレム色が見えにくくなるため、クリア画面では使わない */'
          )
          s = s.replace(
              '.emblem-halo { display: none; position: absolute; inset: -12% -6% -20% -6%; border-radius: 50%; pointer-events: none; }',
              '.emblem-halo { display: none !important; position: absolute; inset: -12% -6% -20% -6%; border-radius: 50%; pointer-events: none; opacity: 0; }'
          )
          s = re.sub(
              r':root\[data-boss="boss"\] #gap-emblem\.best \.emblem-halo,\n:root\[data-boss="boss"\] #gap-emblem\.win \.emblem-halo \{\n(?:.|\n)*?\n\}',
              ':root[data-boss="boss"] #gap-emblem.best .emblem-halo,\n:root[data-boss="boss"] #gap-emblem.win .emblem-halo {\n  display: none !important;\n  background: none;\n  filter: none;\n  opacity: 0;\n}',
              s,
              count=1,
          )
          style_path.write_text(s, encoding='utf-8')

          index_path = Path('web/index.html')
          i = index_path.read_text(encoding='utf-8')
          i = i.replace("var V='118'", "var V='119'")
          i = i.replace('id="build-mark" aria-hidden="true">118</span>', 'id="build-mark" aria-hidden="true">119</span>')
          index_path.write_text(i, encoding='utf-8')

          for p in [Path('.github/workflows/remove-gap-emblem-halo.yml'), Path('.github/remove-gap-emblem-halo.trigger')]:
            if p.exists():
              p.unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/style.css web/index.html .github/workflows/remove-gap-emblem-halo.yml .github/remove-gap-emblem-halo.trigger
          git commit -m "Remove clear-screen emblem halo" || exit 0
          git push
